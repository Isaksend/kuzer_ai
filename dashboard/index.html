<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Monitor — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242736;
            --border: #2e3245;
            --text: #e4e6ef;
            --text2: #8b8fa3;
            --accent: #6366f1;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────────── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text2);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--danger);
            animation: pulse 1.5s infinite;
        }
        .status-dot.connected { background: var(--success); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Layout ──────────────────────────────── */
        .container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 24px;
            padding: 24px 32px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ── Video Panel ─────────────────────────── */
        .video-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-panel img, .video-panel canvas {
            width: 100%;
            display: block;
            border-radius: 12px;
        }
        .panel-header {
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tab-bar {
            display: flex;
            gap: 4px;
        }
        .tab-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: var(--text2);
            transition: all 0.2s;
        }
        .tab-btn:hover { background: var(--surface2); color: var(--text); }
        .tab-btn.active { background: var(--accent); color: #fff; }

        /* ── Zone Editor ─────────────────────────── */
        .zone-editor-wrap {
            position: relative;
            display: none;
        }
        .zone-editor-wrap.active { display: block; }
        #zoneCanvas {
            cursor: crosshair;
            width: 100%;
            display: block;
        }
        .zone-toolbar {
            padding: 10px 18px;
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .zone-toolbar button {
            padding: 7px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .zone-toolbar button:hover { border-color: var(--accent); }
        .zone-toolbar button.primary { background: var(--accent); border-color: var(--accent); }
        .zone-toolbar button.danger { background: var(--danger); border-color: var(--danger); }

        /* ── Sidebar ─────────────────────────────── */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .card-body { padding: 12px 18px; }

        /* ── Incidents List ──────────────────────── */
        .incidents-list {
            max-height: 500px;
            overflow-y: auto;
            padding: 0;
        }
        .incidents-list::-webkit-scrollbar { width: 4px; }
        .incidents-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .incident-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }
        .incident-item:hover { background: var(--surface2); }
        .incident-item:last-child { border-bottom: none; }

        .incident-thumb {
            width: 56px; height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid var(--border);
        }
        .incident-info {
            flex: 1;
            min-width: 0;
        }
        .incident-info .zone-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--danger);
        }
        .incident-info .meta {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }
        .incident-id-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--surface2);
            color: var(--text2);
            white-space: nowrap;
        }

        /* ── Stats ───────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: var(--surface2);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-card .label {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.danger .value { color: var(--danger); }
        .stat-card.warning .value { color: var(--warning); }
        .stat-card.success .value { color: var(--success); }
        .stat-card.accent .value { color: var(--accent); }

        /* ── Modal ───────────────────────────────── */
        .modal-backdrop {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-backdrop.show { display: flex; }
        .modal-img {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        @media (max-width: 960px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>🛡️ Zone Monitor Dashboard</h1>
    <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>
</header>

<div class="container">
    <!-- Left: Video -->
    <div>
        <div class="video-panel">
            <div class="panel-header">
                <span>Live Feed</span>
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('live')">📹 Live</button>
                    <button class="tab-btn" onclick="switchTab('editor')">✏️ Zone Editor</button>
                </div>
            </div>
            <div id="liveWrap">
                <img id="videoFeed" alt="Video Feed" />
            </div>
            <div class="zone-editor-wrap" id="editorWrap">
                <canvas id="zoneCanvas"></canvas>
                <div class="zone-toolbar">
                    <button onclick="finishPolygon()">✅ Finish Zone</button>
                    <button onclick="clearCurrent()">🗑️ Clear Current</button>
                    <button class="danger" onclick="clearAll()">❌ Clear All</button>
                    <button class="primary" onclick="saveZones()">💾 Save Zones</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right: Sidebar -->
    <div class="sidebar">
        <!-- Stats -->
        <div class="card">
            <div class="card-header">📊 Statistics</div>
            <div class="card-body">
                <div class="stats-grid">
                    <div class="stat-card danger">
                        <div class="value" id="statTotal">0</div>
                        <div class="label">Incidents</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="value" id="statZones">0</div>
                        <div class="label">Active Zones</div>
                    </div>
                    <div class="stat-card success">
                        <div class="value" id="statIds">0</div>
                        <div class="label">Unique IDs</div>
                    </div>
                    <div class="stat-card accent">
                        <div class="value" id="statFps">—</div>
                        <div class="label">Stream FPS</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Incidents -->
        <div class="card" style="flex:1;">
            <div class="card-header">🚨 Recent Incidents</div>
            <div class="incidents-list" id="incidentsList">
                <div style="padding:24px;text-align:center;color:var(--text2);font-size:13px;">
                    Loading incidents...
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Image Modal -->
<div class="modal-backdrop" id="modal" onclick="this.classList.remove('show')">
    <img class="modal-img" id="modalImg" />
</div>

<script>
// ── WebSocket Video Stream ──────────────────────────────────────
const img = document.getElementById('videoFeed');
const dot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
let ws, frameCount = 0, fpsInterval;

function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/video`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        dot.classList.add('connected');
        statusText.textContent = 'Connected';
        frameCount = 0;
        fpsInterval = setInterval(() => {
            document.getElementById('statFps').textContent = frameCount;
            frameCount = 0;
        }, 1000);
    };

    ws.onmessage = (e) => {
        const blob = new Blob([e.data], { type: 'image/jpeg' });
        const oldSrc = img.src;
        img.src = URL.createObjectURL(blob);
        if (oldSrc && oldSrc.startsWith('blob:')) URL.revokeObjectURL(oldSrc);
        frameCount++;
    };

    ws.onclose = () => {
        dot.classList.remove('connected');
        statusText.textContent = 'Disconnected. Reconnecting...';
        clearInterval(fpsInterval);
        setTimeout(connectWS, 2000);
    };
}
connectWS();

// ── Incidents ───────────────────────────────────────────────────
async function loadIncidents() {
    try {
        const res = await fetch('/api/incidents');
        const data = await res.json();
        const list = document.getElementById('incidentsList');

        if (!data.length) {
            list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text2);font-size:13px;">No incidents yet</div>';
            document.getElementById('statTotal').textContent = '0';
            document.getElementById('statIds').textContent = '0';
            return;
        }

        document.getElementById('statTotal').textContent = data.length;
        const uniqueIds = new Set(data.map(d => d.object_id));
        document.getElementById('statIds').textContent = uniqueIds.size;

        list.innerHTML = data.map(d => `
            <div class="incident-item" onclick="showImage('/incidents/${d.screenshot}')">
                <img class="incident-thumb" src="/incidents/${d.screenshot}" onerror="this.style.display='none'" />
                <div class="incident-info">
                    <div class="zone-label">📍 ${d.zone_name}</div>
                    <div class="meta">${d.timestamp}</div>
                </div>
                <span class="incident-id-badge">ID: ${d.object_id}</span>
            </div>
        `).join('');
    } catch (e) {
        console.error('Failed to load incidents', e);
    }
}

function showImage(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('modal').classList.add('show');
}

loadIncidents();
setInterval(loadIncidents, 5000);

// ── Zone Stats ──────────────────────────────────────────────────
async function loadZoneStats() {
    try {
        const res = await fetch('/api/zones');
        const data = await res.json();
        const count = (data.zones || []).length;
        document.getElementById('statZones').textContent = count;
    } catch (e) {}
}
loadZoneStats();

// ── Tab Switching ───────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (tab === 'live') {
        document.getElementById('liveWrap').style.display = 'block';
        document.getElementById('editorWrap').classList.remove('active');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
    } else {
        document.getElementById('liveWrap').style.display = 'none';
        document.getElementById('editorWrap').classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        initCanvas();
    }
}

// ── Zone Editor (Canvas) ────────────────────────────────────────
const canvas = document.getElementById('zoneCanvas');
const ctx = canvas.getContext('2d');
// Каждая зона: {name: string, points: [[x,y], ...]}
let editorZones = [];
let currentPoints = [];
let bgImage = null;

const COLORS = ['#ef4444', '#f59e0b', '#eab308', '#a855f7', '#3b82f6'];

async function initCanvas() {
    const res = await fetch('/api/zones');
    const data = await res.json();
    // Загружаем зоны вместе с именами
    editorZones = (data.zones || []).map((z, i) => ({
        name: z.name || `Zone_${i + 1}`,
        points: z.points,
    }));

    if (img.src) {
        bgImage = new Image();
        bgImage.crossOrigin = 'anonymous';
        bgImage.onload = () => {
            canvas.width = bgImage.naturalWidth;
            canvas.height = bgImage.naturalHeight;
            drawCanvas();
        };
        bgImage.src = img.src;
    }
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.round((e.clientX - rect.left) * scaleX);
    const y = Math.round((e.clientY - rect.top) * scaleY);
    currentPoints.push([x, y]);
    drawCanvas();
});

function drawCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bgImage) ctx.drawImage(bgImage, 0, 0);

    // Завершённые зоны (с именами)
    editorZones.forEach((zone, i) => {
        const color = COLORS[i % COLORS.length];
        ctx.beginPath();
        zone.points.forEach((p, j) => j === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
        ctx.closePath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = color + '33';
        ctx.fill();
        const cx = zone.points.reduce((s, p) => s + p[0], 0) / zone.points.length;
        const cy = zone.points.reduce((s, p) => s + p[1], 0) / zone.points.length;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Inter';
        ctx.fillText(zone.name, cx - 25, cy + 5);
    });

    // Текущий незавершённый полигон (зелёный)
    if (currentPoints.length) {
        ctx.beginPath();
        currentPoints.forEach((p, j) => j === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        ctx.stroke();
        currentPoints.forEach(p => {
            ctx.beginPath();
            ctx.arc(p[0], p[1], 5, 0, Math.PI * 2);
            ctx.fillStyle = '#22c55e';
            ctx.fill();
        });
        // Подпись будущей зоны
        const nextIdx = editorZones.length + 1;
        if (currentPoints.length >= 2) {
            const cx = currentPoints.reduce((s, p) => s + p[0], 0) / currentPoints.length;
            const cy = currentPoints.reduce((s, p) => s + p[1], 0) / currentPoints.length;
            ctx.fillStyle = '#22c55e';
            ctx.font = 'bold 14px Inter';
            ctx.fillText(`Zone_${nextIdx} (drawing...)`, cx - 40, cy + 5);
        }
    }
}

function finishPolygon() {
    if (currentPoints.length < 3) { alert('Need at least 3 points!'); return; }
    const nextIdx = editorZones.length + 1;
    editorZones.push({ name: `Zone_${nextIdx}`, points: [...currentPoints] });
    currentPoints = [];
    drawCanvas();
}

function clearCurrent() {
    currentPoints = [];
    drawCanvas();
}

function clearAll() {
    if (!confirm('Clear ALL zones (including saved)?')) return;
    editorZones = [];
    currentPoints = [];
    drawCanvas();
}

async function saveZones() {
    if (currentPoints.length >= 3) {
        const nextIdx = editorZones.length + 1;
        editorZones.push({ name: `Zone_${nextIdx}`, points: [...currentPoints] });
        currentPoints = [];
    }
    if (!editorZones.length) { alert('No zones to save!'); return; }

    const body = {
        zones: editorZones.map(z => ({ name: z.name, points: z.points }))
    };

    const res = await fetch('/api/zones', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
    });
    const result = await res.json();
    alert(`Saved ${result.count} zone(s)! Restart the dashboard to apply changes.`);
    loadZoneStats();
    drawCanvas();
}
</script>
</body>
</html>
